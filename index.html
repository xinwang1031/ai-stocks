<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Stock Trend Dashboard</title>
<style>
  /* ============================================================
     RESET & BASE
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-font-smoothing: antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
    background: #09090b;
    color: #e4e4e7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ============================================================
     AMBIENT BACKGROUND GLOW
     ============================================================ */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(56,189,248,0.06), transparent),
      radial-gradient(ellipse 60% 70% at 80% 90%, rgba(34,197,94,0.05), transparent),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(99,102,241,0.04), transparent);
    pointer-events: none;
  }

  /* ============================================================
     LAYOUT
     ============================================================ */
  .app { position: relative; z-index: 1; max-width: 1320px; margin: 0 auto; padding: 40px 28px 60px; }

  /* ---- Header ---- */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px; margin-bottom: 44px;
  }
  .header-brand { display: flex; align-items: center; gap: 14px; }
  .header-logo {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, #6366f1, #38bdf8);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #fff;
    box-shadow: 0 0 24px rgba(99,102,241,0.4);
  }
  .header-title { font-size: 1.55rem; font-weight: 700; letter-spacing: -0.02em; }
  .header-subtitle { font-size: 0.82rem; color: #71717a; margin-top: 2px; font-weight: 500; }

  /* ---- Controls ---- */
  .controls { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn {
    padding: 7px 16px; border-radius: 8px; border: 1px solid #27272a;
    background: #18181b; color: #a1a1aa; font-size: 0.8rem;
    font-weight: 500; cursor: pointer; transition: all 0.2s;
    font-family: inherit; white-space: nowrap;
    user-select: none;
  }
  .btn:hover { border-color: #3f3f46; color: #e4e4e7; background: #1f1f23; }
  .btn.active { background: #27272a; border-color: #52525b; color: #fff; }

  /* ---- Section ---- */
  .section { margin-bottom: 40px; }
  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
  }
  .section-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .section-dot.us { background: #38bdf8; box-shadow: 0 0 10px rgba(56,189,248,0.6); }
  .section-dot.ashare { background: #f97316; box-shadow: 0 0 10px rgba(249,115,22,0.6); }
  .section-dot.hk { background: #a78bfa; box-shadow: 0 0 10px rgba(167,139,250,0.6); }
  .section-title { font-size: 1.1rem; font-weight: 650; letter-spacing: -0.01em; }
  .section-count { color: #52525b; font-size: 0.78rem; font-weight: 500; }

  /* ---- Card Grid ---- */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }

  /* ---- Card ---- */
  .card {
    background: #0f0f12;
    border: 1px solid #1e1e24;
    border-radius: 16px;
    padding: 18px 18px 14px;
    cursor: default;
    transition: all 0.28s cubic-bezier(0.25, 0, 0.25, 1);
    position: relative;
    overflow: hidden;
  }
  .card::after {
    content: '';
    position: absolute; inset: 0; border-radius: 16px;
    background: radial-gradient(400px circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.02), transparent);
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .card:hover { border-color: #2a2a34; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
  .card:hover::after { opacity: 1; }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .card-ticker { font-size: 0.7rem; font-weight: 700; color: #71717a; letter-spacing: 0.04em; text-transform: uppercase; }
  .card-exchange {
    font-size: 0.6rem; padding: 2px 7px; border-radius: 5px;
    font-weight: 600; letter-spacing: 0.02em;
  }
  .card-exchange.us { background: rgba(56,189,248,0.12); color: #38bdf8; }
  .card-exchange.ashare { background: rgba(249,115,22,0.12); color: #f97316; }
  .card-exchange.hk { background: rgba(167,139,250,0.12); color: #a78bfa; }

  .card-name { font-size: 0.85rem; font-weight: 600; color: #d4d4d8; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .card-price-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
  .card-price { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .card-change {
    font-size: 0.82rem; font-weight: 650; padding: 3px 9px; border-radius: 6px;
    font-variant-numeric: tabular-nums;
  }
  .card-change.up { background: rgba(34,197,94,0.12); color: #4ade80; }
  .card-change.down { background: rgba(239,68,68,0.12); color: #f87171; }

  /* ---- Sparkline ---- */
  .card-spark {
    margin-top: 6px; width: 100%; height: 44px;
  }
  .card-spark svg { width: 100%; height: 100%; display: block; }

  /* ---- Footer ---- */
  .footer {
    text-align: center; color: #3f3f46; font-size: 0.72rem;
    margin-top: 10px; padding-top: 20px; border-top: 1px solid #1e1e24;
  }

  /* ---- Card Entry Animation ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeUp 0.5s ease both; }
  .card:nth-child(1) { animation-delay: 0.02s; }
  .card:nth-child(2) { animation-delay: 0.06s; }
  .card:nth-child(3) { animation-delay: 0.10s; }
  .card:nth-child(4) { animation-delay: 0.14s; }
  .card:nth-child(5) { animation-delay: 0.18s; }
  .card:nth-child(6) { animation-delay: 0.22s; }
  .card:nth-child(7) { animation-delay: 0.26s; }
  .card:nth-child(8) { animation-delay: 0.30s; }
  .card:nth-child(9) { animation-delay: 0.34s; }

  /* ---- Responsive ---- */
  @media (max-width: 768px) {
    .app { padding: 24px 14px 40px; }
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .header { flex-direction: column; align-items: flex-start; }
    .card { padding: 14px 14px 12px; }
    .card-price { font-size: 1.15rem; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ============================================================
       HEADER
       ============================================================ -->
  <header class="header">
    <div class="header-brand">
      <div class="header-logo">📈</div>
      <div>
        <div class="header-title">AI Stock Trends</div>
        <div class="header-subtitle">US · A-Share · HK Markets</div>
      </div>
    </div>
    <div class="controls" id="sortControls">
      <button class="btn active" data-sort="default">Default</button>
      <button class="btn" data-sort="name">Sort by Name</button>
      <button class="btn" data-sort="change">Sort by Change %</button>
    </div>
  </header>

  <!-- ============================================================
       US MARKET
       ============================================================ -->
  <section class="section" data-market="us">
    <div class="section-header">
      <span class="section-dot us"></span>
      <span class="section-title">US Market</span>
      <span class="section-count">5 stocks</span>
    </div>
    <div class="card-grid" id="grid-us"></div>
  </section>

  <!-- ============================================================
       A-SHARE MARKET
       ============================================================ -->
  <section class="section" data-market="ashare">
    <div class="section-header">
      <span class="section-dot ashare"></span>
      <span class="section-title">A-Share Market</span>
      <span class="section-count">2 stocks</span>
    </div>
    <div class="card-grid" id="grid-ashare"></div>
  </section>

  <!-- ============================================================
       HK MARKET
       ============================================================ -->
  <section class="section" data-market="hk">
    <div class="section-header">
      <span class="section-dot hk"></span>
      <span class="section-title">HK Market</span>
      <span class="section-count">2 stocks</span>
    </div>
    <div class="card-grid" id="grid-hk"></div>
  </section>

  <footer class="footer">AI Stock Trend Dashboard · Data simulated for demonstration · 2026</footer>

</div>

<!-- ============================================================
     SCRIPTS
     ============================================================ -->
<script>
(function() {
  'use strict';

  // ── Sample Stock Data ────────────────────────────────────────
  var stocks = [
    { ticker:'NVDA',   name:'NVIDIA Corporation',        price:135.42,  change: 2.34, market:'us',    exchange:'NASDAQ', trend:[10,14,12,18,20,16,22,26,24,30,32,28,34,38,36,40,44,42,48,52] },
    { ticker:'AMD',    name:'Advanced Micro Devices',     price:168.27,  change:-1.12, market:'us',    exchange:'NASDAQ', trend:[42,44,40,38,42,46,44,40,36,38,34,36,40,38,34,32,30,33,30,28] },
    { ticker:'TSLA',   name:'Tesla Inc.',                 price:248.50,  change: 5.67, market:'us',    exchange:'NASDAQ', trend:[30,26,32,28,34,38,36,42,40,46,44,50,54,48,52,58,56,60,56,62] },
    { ticker:'GOOGL',  name:'Alphabet Inc.',              price:175.80,  change: 0.89, market:'us',    exchange:'NASDAQ', trend:[48,50,47,49,52,51,48,50,53,51,49,52,54,50,48,52,50,49,51,50] },
    { ticker:'MSFT',   name:'Microsoft Corporation',      price:425.30,  change:-0.45, market:'us',    exchange:'NASDAQ', trend:[58,56,60,62,58,54,52,56,54,50,48,52,50,46,48,44,46,42,44,40] },
    { ticker:'002230', name:'科大讯飞 iFlytek',           price:48.32,   change: 3.21, market:'ashare',exchange:'SZ',    trend:[20,18,22,24,28,26,30,34,32,36,38,42,40,44,46,48,50,52,55,58] },
    { ticker:'688256', name:'寒武纪 Cambricon',           price:256.80,  change:-2.15, market:'ashare',exchange:'SS',    trend:[60,64,58,54,56,50,48,44,46,42,38,40,36,34,30,32,28,26,24,22] },
    { ticker:'00700',  name:'腾讯控股 Tencent',           price:380.20,  change: 1.56, market:'hk',    exchange:'HKEX',  trend:[44,46,42,48,50,46,52,50,54,56,52,58,60,56,58,62,60,64,62,66] },
    { ticker:'09988',  name:'阿里巴巴 Alibaba',           price:82.50,   change:-0.78, market:'hk',    exchange:'HKEX',  trend:[50,52,48,46,50,48,44,42,46,44,40,38,42,40,36,38,34,36,33,32] }
  ];

  // ── Helpers ──────────────────────────────────────────────────
  var currencyMap = { us: '$', ashare: '¥', hk: 'HK$' };
  var exClassMap = { us: 'us', ashare: 'ashare', hk: 'hk' };

  function fmtPrice(v, m) {
    var c = currencyMap[m] || '$';
    return c + v.toFixed(2);
  }

  function fmtChange(v) {
    return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
  }

  // ── Sparkline SVG ────────────────────────────────────────────
  function sparklineSVG(points, up) {
    var w = 200, h = 44, pad = 2;
    var min = Math.min.apply(null, points);
    var max = Math.max.apply(null, points);
    var range = (max - min) || 1;
    var xs = points.map(function(_, i) { return pad + (i / (points.length - 1)) * (w - pad * 2); });
    var ys = points.map(function(v) { return h - pad - ((v - min) / range) * (h - pad * 2); });

    // Build smooth bezier path
    var d = 'M' + xs[0] + ',' + ys[0];
    for (var i = 1; i < points.length; i++) {
      var cx = (xs[i-1] + xs[i]) / 2;
      d += ' C' + cx + ',' + ys[i-1] + ' ' + cx + ',' + ys[i] + ' ' + xs[i] + ',' + ys[i];
    }

    var color = up ? '#4ade80' : '#f87171';
    var gradId = 'g' + Math.random().toString(36).slice(2, 9);

    var grad = '<defs><linearGradient id="' + gradId + '" x1="0" x2="0" y1="0" y2="1">' +
      '<stop offset="0%" stop-color="' + color + '" stop-opacity="0.25"/>' +
      '<stop offset="100%" stop-color="' + color + '" stop-opacity="0.02"/>' +
      '</linearGradient></defs>';

    var areaD = d + ' L' + xs[xs.length-1] + ',' + h + ' L' + xs[0] + ',' + h + ' Z';

    return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
      grad +
      '<path d="' + areaD + '" fill="url(#' + gradId + ')"/>' +
      '<path d="' + d + '" fill="none" stroke="' + color + '" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>' +
      '</svg>';
  }

  // ── Card HTML ────────────────────────────────────────────────
  function buildCard(s) {
    var up = s.change >= 0;
    return '<div class="card" data-ticker="' + s.ticker + '" data-change="' + s.change + '" data-name="' + s.name + '" data-market="' + s.market + '">' +
      '<div class="card-top">' +
        '<span class="card-ticker">' + s.ticker + '</span>' +
        '<span class="card-exchange ' + exClassMap[s.market] + '">' + s.exchange + '</span>' +
      '</div>' +
      '<div class="card-name" title="' + s.name + '">' + s.name + '</div>' +
      '<div class="card-price-row">' +
        '<span class="card-price">' + fmtPrice(s.price, s.market) + '</span>' +
        '<span class="card-change ' + (up ? 'up' : 'down') + '">' + fmtChange(s.change) + '</span>' +
      '</div>' +
      '<div class="card-spark">' + sparklineSVG(s.trend, up) + '</div>' +
      '</div>';
  }

  // ── Render ───────────────────────────────────────────────────
  var gridUS = document.getElementById('grid-us');
  var gridAShare = document.getElementById('grid-ashare');
  var gridHK = document.getElementById('grid-hk');

  function renderAll(data) {
    gridUS.innerHTML = '';
    gridAShare.innerHTML = '';
    gridHK.innerHTML = '';
    data.forEach(function(s) {
      var html = buildCard(s);
      if (s.market === 'us') gridUS.innerHTML += html;
      else if (s.market === 'ashare') gridAShare.innerHTML += html;
      else gridHK.innerHTML += html;
    });
  }

  // ── Sort ─────────────────────────────────────────────────────
  var sortControls = document.getElementById('sortControls');
  var currentSort = 'default';

  function sortData(data, mode) {
    var copy = data.slice();
    if (mode === 'name') {
      copy.sort(function(a, b) { return a.name.localeCompare(b.name); });
    } else if (mode === 'change') {
      copy.sort(function(a, b) { return b.change - a.change; });
    } else {
      var order = { us: 0, ashare: 1, hk: 2 };
      copy.sort(function(a, b) { return (order[a.market] - order[b.market]) || a.ticker.localeCompare(b.ticker); });
    }
    return copy;
  }

  function applySort(mode) {
    currentSort = mode;
    renderAll(sortData(stocks, mode));
    var buttons = sortControls.querySelectorAll('.btn');
    for (var i = 0; i < buttons.length; i++) buttons[i].classList.remove('active');
    var active = sortControls.querySelector('[data-sort="' + mode + '"]');
    if (active) active.classList.add('active');
  }

  sortControls.addEventListener('click', function(e) {
    var btn = e.target.closest('.btn');
    if (!btn) return;
    var mode = btn.getAttribute('data-sort');
    if (mode && mode !== currentSort) applySort(mode);
  });

  // ── Mouse-tracking gradient effect on cards ──────────────────
  document.addEventListener('mousemove', function(e) {
    var hovered = document.querySelectorAll('.card:hover');
    for (var i = 0; i < hovered.length; i++) {
      var rect = hovered[i].getBoundingClientRect();
      hovered[i].style.setProperty('--mx', (e.clientX - rect.left) + 'px');
      hovered[i].style.setProperty('--my', (e.clientY - rect.top) + 'px');
    }
  });

  // ── Kick off ─────────────────────────────────────────────────
  applySort('default');

})();
</script>

</body>
</html>
